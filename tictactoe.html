<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      padding: 2rem;
    }

    #wrapper {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 3rem;
    }

    /* ── Left panel ── */
    #left-panel {
      width: 210px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 1.2rem;
      flex-shrink: 0;
    }

    #left-panel h2 {
      font-size: 1rem;
      letter-spacing: 1px;
      color: #a8dadc;
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-align: center;
    }

    #stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    #stats-table th {
      color: #888;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.3rem 0.4rem;
      border-bottom: 1px solid #0f3460;
      text-align: center;
    }

    #stats-table th:first-child { text-align: left; }

    #stats-table td {
      padding: 0.5rem 0.4rem;
      text-align: center;
      border-bottom: 1px solid #0f3460;
      color: #ccc;
      transition: background 0.2s;
    }

    #stats-table td:first-child { text-align: left; font-weight: 500; }
    #stats-table tr:last-child td { border-bottom: none; }

    #stats-table tr.active-x td { background: rgba(233,69,96,0.12); }
    #stats-table tr.active-o td { background: rgba(168,218,220,0.12); }
    #stats-table tr.active-x td:first-child { color: #e94560; }
    #stats-table tr.active-o td:first-child { color: #a8dadc; }

    .stat-w { color: #4caf50; }
    .stat-l { color: #e94560; }
    .stat-t { color: #f4a261; }

    /* ── Game center ── */
    #game-center {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    .pill-group {
      display: flex;
      gap: 0;
      border: 1px solid #0f3460;
      border-radius: 30px;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }

    .pill-group button {
      padding: 0.4rem 1.1rem;
      font-size: 0.82rem;
      border: none;
      background: #16213e;
      color: #aaa;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .pill-group button.active-mode { background: #e94560; color: #fff; }
    .pill-group button.active-diff { background: #0f3460; color: #a8dadc; }
    .pill-group button.active-x    { background: rgba(233,69,96,0.35); color: #e94560; }
    .pill-group button.active-o    { background: rgba(168,218,220,0.25); color: #a8dadc; }

    #name-selectors {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
      width: 100%;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .name-row .slot-label {
      font-size: 0.78rem;
      color: #888;
      width: 52px;
      text-align: right;
      flex-shrink: 0;
    }

    /* score boxes */
    #scores {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.2rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      min-width: 70px;
    }

    .score-box .label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .val   { font-size: 1.4rem; font-weight: bold; }
    .score-box.x .val { color: #e94560; }
    .score-box.o .val { color: #a8dadc; }
    .score-box.tie .val { color: #f4a261; }

    #status {
      font-size: 1.05rem;
      margin-bottom: 1.2rem;
      min-height: 1.5em;
      color: #a8dadc;
      text-align: center;
    }

    /* ── Board area (dice + board) ── */
    #board-area {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1.2rem;
    }

    /* ── Dice ── */
    .die-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      width: 88px;
    }

    .die-player-name {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .die-player-name.x-name { color: #e94560; }
    .die-player-name.o-name { color: #a8dadc; }

    .die {
      width: 88px;
      height: 88px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 14px;
      cursor: pointer;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 10px;
      gap: 5px;
      transition: transform 0.12s, border-color 0.2s, box-shadow 0.2s;
      user-select: none;
      position: relative;
    }

    .die:hover:not(.no-click) {
      transform: scale(1.06);
    }

    .die.x-die { border-color: rgba(233,69,96,0.35); }
    .die.o-die { border-color: rgba(168,218,220,0.35); }

    .die.x-die.rolled { border-color: #e94560; box-shadow: 0 0 10px rgba(233,69,96,0.4); }
    .die.o-die.rolled { border-color: #a8dadc; box-shadow: 0 0 10px rgba(168,218,220,0.4); }

    .die.no-click { cursor: default; }

    @keyframes shake {
      0%   { transform: rotate(-10deg) scale(1.07); }
      25%  { transform: rotate(8deg)  scale(1.07); }
      50%  { transform: rotate(-6deg) scale(1.07); }
      75%  { transform: rotate(9deg)  scale(1.07); }
      100% { transform: rotate(-10deg) scale(1.07); }
    }

    .die.rolling { animation: shake 0.12s ease-in-out infinite; }

    .pip {
      border-radius: 50%;
      background: transparent;
      transition: background 0.08s;
    }

    .pip.show.x-pip { background: #e94560; }
    .pip.show.o-pip { background: #a8dadc; }

    .die-roll-val {
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 1.6em;
      text-align: center;
    }

    .die-roll-val.x-val { color: #e94560; }
    .die-roll-val.o-val { color: #a8dadc; }

    .die-hint {
      font-size: 0.68rem;
      color: #555;
      text-align: center;
      letter-spacing: 0.3px;
      min-height: 1em;
    }

    /* ── Board ── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.locked) { background: #0f3460; transform: scale(1.04); }
    .cell.taken  { cursor: default; }
    .cell.locked { cursor: default; opacity: 0.6; }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 6px #e94560; }
      to   { box-shadow: 0 0 20px #e94560; }
    }

    #reset {
      margin-top: 1.5rem;
      padding: 0.65rem 2.2rem;
      font-size: 0.95rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.05); }
  </style>
</head>
<body>
<div id="wrapper">

  <!-- Left: stats table -->
  <div id="left-panel">
    <h2>Player Stats</h2>
    <table id="stats-table">
      <thead>
        <tr>
          <th>Name</th>
          <th class="stat-w">W</th>
          <th class="stat-l">L</th>
          <th class="stat-t">T</th>
        </tr>
      </thead>
      <tbody id="stats-body"></tbody>
    </table>
  </div>

  <!-- Center: game -->
  <div id="game-center">
    <h1>Tic Tac Toe</h1>

    <div class="pill-group" id="mode-toggle">
      <button id="btn-pvp">2 Players</button>
      <button id="btn-ai" class="active-mode">vs AI</button>
    </div>

    <div class="pill-group" id="difficulty">
      <button id="diff-easy">Easy</button>
      <button id="diff-medium">Medium</button>
      <button id="diff-hard" class="active-diff">Hard</button>
    </div>

    <div id="name-selectors">
      <div class="name-row">
        <span class="slot-label">Player X:</span>
        <div class="pill-group" id="names-x"></div>
      </div>
      <div class="name-row" id="o-name-row">
        <span class="slot-label">Player O:</span>
        <div class="pill-group" id="names-o"></div>
      </div>
    </div>

    <div id="scores">
      <div class="score-box x">
        <div class="label" id="label-x">Travis</div>
        <div class="val" id="score-x">0</div>
      </div>
      <div class="score-box tie">
        <div class="label">Ties</div>
        <div class="val" id="score-tie">0</div>
      </div>
      <div class="score-box o">
        <div class="label" id="label-o">AI</div>
        <div class="val" id="score-o">0</div>
      </div>
    </div>

    <div id="status"></div>

    <!-- Dice flank the board -->
    <div id="board-area">

      <!-- X die (left) -->
      <div class="die-wrapper">
        <div class="die-player-name x-name" id="die-x-name">Travis</div>
        <div class="die x-die" id="die-x"></div>
        <div class="die-roll-val x-val" id="die-x-val"></div>
        <div class="die-hint" id="die-x-hint">click to roll</div>
      </div>

      <div id="board"></div>

      <!-- O die (right) -->
      <div class="die-wrapper">
        <div class="die-player-name o-name" id="die-o-name">AI</div>
        <div class="die o-die" id="die-o"></div>
        <div class="die-roll-val o-val" id="die-o-val"></div>
        <div class="die-hint" id="die-o-hint">auto-rolls</div>
      </div>

    </div>

    <button id="reset">New Game</button>
  </div>

</div>

<script>
  const NAMES = ['Travis', 'Alicia', 'Cooper', 'Brooks'];
  const WINS  = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // Which grid cells are lit for each die face (3x3 grid, 0=TL … 8=BR)
  const PIP_PATTERNS = {
    1: [4],
    2: [2, 6],
    3: [2, 4, 6],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8]
  };

  // Per-player stats — persisted in localStorage
  const STORAGE_KEY = 'ttt-stats';
  const stats = (() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && NAMES.every(n => saved[n])) return saved;
    } catch {}
    const fresh = {};
    NAMES.forEach(n => { fresh[n] = { W: 0, L: 0, T: 0 }; });
    return fresh;
  })();

  const sessionScores = { X: 0, O: 0, Tie: 0 };

  let vsAI       = true;
  let difficulty = 'hard';
  let playerX    = 'Travis';
  let playerO    = 'Alicia';

  let board, current, over, aiThinking, rollPhase;
  let diceVals = { X: null, O: null };

  const boardEl  = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const cells    = [];

  // ── Build pip grids inside each die ──
  function buildDieFaces() {
    ['die-x', 'die-o'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const pip = document.createElement('div');
        pip.className = 'pip';
        el.appendChild(pip);
      }
    });
  }

  function renderDie(id, value, pipClass) {
    const el = document.getElementById(id);
    const pips = el.querySelectorAll('.pip');
    const lit = value ? PIP_PATTERNS[value] : [];
    pips.forEach((p, i) => {
      p.className = 'pip ' + pipClass + (lit.includes(i) ? ' show' : '');
    });
  }

  function animateDie(player, onDone) {
    const id     = player === 'X' ? 'die-x'     : 'die-o';
    const valId  = player === 'X' ? 'die-x-val' : 'die-o-val';
    const pip    = player === 'X' ? 'x-pip'     : 'o-pip';
    const el     = document.getElementById(id);

    el.classList.add('rolling', 'no-click');
    document.getElementById(valId).textContent = '';

    let ticks = 0;
    const total = 12;
    const iv = setInterval(() => {
      renderDie(id, Math.ceil(Math.random() * 6), pip);
      ticks++;
      if (ticks >= total) {
        clearInterval(iv);
        const result = Math.ceil(Math.random() * 6);
        el.classList.remove('rolling');
        el.classList.add('rolled');
        renderDie(id, result, pip);
        document.getElementById(valId).textContent = result;
        onDone(result);
      }
    }, 80);
  }

  function rollX() {
    if (!rollPhase || diceVals.X !== null) return;
    const hintEl = document.getElementById('die-x-hint');
    hintEl.textContent = 'rolling…';
    animateDie('X', val => {
      diceVals.X = val;
      hintEl.textContent = '';
      if (vsAI) {
        // AI auto-rolls its die after a brief pause
        document.getElementById('die-o-hint').textContent = 'rolling…';
        setTimeout(() => rollO(), 450);
      } else {
        checkDiceResult();
      }
    });
  }

  function rollO() {
    if (!rollPhase || diceVals.O !== null) return;
    const hintEl = document.getElementById('die-o-hint');
    animateDie('O', val => {
      diceVals.O = val;
      hintEl.textContent = '';
      checkDiceResult();
    });
  }

  function checkDiceResult() {
    if (diceVals.X === null || diceVals.O === null) return;

    const xName = playerX;
    const oName = vsAI ? 'AI' : playerO;

    if (diceVals.X > diceVals.O) {
      setStatus(`${xName} rolls higher — X goes first!`);
      beginGame('X');
    } else if (diceVals.O > diceVals.X) {
      setStatus(`${oName} rolls higher — O goes first!`);
      beginGame('O');
    } else {
      setStatus(`Tie roll (${diceVals.X} = ${diceVals.O}) — roll again!`);
      setTimeout(resetDice, 900);
    }
  }

  function resetDice() {
    diceVals = { X: null, O: null };
    ['die-x', 'die-o'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('rolling', 'rolled', 'no-click');
    });
    renderDie('die-x', null, 'x-pip');
    renderDie('die-o', null, 'o-pip');
    document.getElementById('die-x-val').textContent = '';
    document.getElementById('die-o-val').textContent = '';
    document.getElementById('die-x-hint').textContent = 'click to roll';
    document.getElementById('die-o-hint').textContent = vsAI ? 'auto-rolls' : 'click to roll';
    setStatus('Roll the dice to see who goes first!');
  }

  function beginGame(first) {
    rollPhase = false;
    current   = first;
    cells.forEach(c => c.classList.remove('locked'));

    if (vsAI && current === 'O') {
      aiThinking = true;
      setStatus('AI is thinking…');
      setTimeout(() => { aiThinking = false; applyMove(getAIMove()); }, 700);
    } else {
      const name = current === 'X' ? playerX : (vsAI ? 'AI' : playerO);
      setStatus(`${name}'s turn`);
    }
  }

  // ── Stats table ──
  const tbody = document.getElementById('stats-body');
  NAMES.forEach(name => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + name;
    tr.innerHTML = `<td>${name}</td>
      <td id="w-${name}" class="stat-w">0</td>
      <td id="l-${name}" class="stat-l">0</td>
      <td id="t-${name}" class="stat-t">0</td>`;
    tbody.appendChild(tr);
  });

  // ── Name buttons ──
  function buildNameButtons(groupId, onSelect) {
    const group = document.getElementById(groupId);
    group.innerHTML = '';
    NAMES.forEach(name => {
      const btn = document.createElement('button');
      btn.textContent = name;
      btn.dataset.name = name;
      btn.addEventListener('click', () => onSelect(name));
      group.appendChild(btn);
    });
  }

  function refreshNameButtons() {
    document.querySelectorAll('#names-x button').forEach(b =>
      b.classList.toggle('active-x', b.dataset.name === playerX));
    document.querySelectorAll('#names-o button').forEach(b =>
      b.classList.toggle('active-o', b.dataset.name === playerO));
  }

  buildNameButtons('names-x', name => {
    if (!vsAI && name === playerO) return;
    playerX = name;
    resetSessionScores();
    refreshNameButtons();
    refreshLabels();
    highlightStatsRows();
    init();
  });

  buildNameButtons('names-o', name => {
    if (name === playerX) return;
    playerO = name;
    resetSessionScores();
    refreshNameButtons();
    refreshLabels();
    highlightStatsRows();
    init();
  });

  refreshNameButtons();

  // ── Mode toggle ──
  document.getElementById('btn-pvp').addEventListener('click', () => {
    vsAI = false;
    document.getElementById('btn-pvp').classList.add('active-mode');
    document.getElementById('btn-ai').classList.remove('active-mode');
    document.getElementById('difficulty').style.visibility = 'hidden';
    document.getElementById('o-name-row').style.display = 'flex';
    resetSessionScores(); refreshLabels(); highlightStatsRows(); init();
  });

  document.getElementById('btn-ai').addEventListener('click', () => {
    vsAI = true;
    document.getElementById('btn-ai').classList.add('active-mode');
    document.getElementById('btn-pvp').classList.remove('active-mode');
    document.getElementById('difficulty').style.visibility = 'visible';
    document.getElementById('o-name-row').style.display = 'none';
    resetSessionScores(); refreshLabels(); highlightStatsRows(); init();
  });

  document.getElementById('o-name-row').style.display = 'none';

  // ── Difficulty ──
  ['easy','medium','hard'].forEach(d => {
    document.getElementById('diff-' + d).addEventListener('click', () => {
      difficulty = d;
      document.querySelectorAll('#difficulty button').forEach(b => b.classList.remove('active-diff'));
      document.getElementById('diff-' + d).classList.add('active-diff');
      init();
    });
  });

  // ── Labels & scores ──
  function refreshLabels() {
    document.getElementById('label-x').textContent    = playerX;
    document.getElementById('label-o').textContent    = vsAI ? 'AI' : playerO;
    document.getElementById('die-x-name').textContent = playerX;
    document.getElementById('die-o-name').textContent = vsAI ? 'AI' : playerO;
  }

  function resetSessionScores() {
    sessionScores.X = 0; sessionScores.O = 0; sessionScores.Tie = 0;
    updateScoreBoxes();
  }

  function updateScoreBoxes() {
    document.getElementById('score-x').textContent   = sessionScores.X;
    document.getElementById('score-o').textContent   = sessionScores.O;
    document.getElementById('score-tie').textContent = sessionScores.Tie;
  }

  function highlightStatsRows() {
    NAMES.forEach(n => {
      document.getElementById('row-' + n).classList.remove('active-x', 'active-o');
    });
    document.getElementById('row-' + playerX).classList.add('active-x');
    if (!vsAI) document.getElementById('row-' + playerO).classList.add('active-o');
  }

  function updateStatsTable() {
    NAMES.forEach(n => {
      document.getElementById('w-' + n).textContent = stats[n].W;
      document.getElementById('l-' + n).textContent = stats[n].L;
      document.getElementById('t-' + n).textContent = stats[n].T;
    });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch {}
  }

  function recordResult(winner) {
    if (winner === 'X') {
      stats[playerX].W++; sessionScores.X++;
      if (!vsAI) stats[playerO].L++;
    } else if (winner === 'O') {
      stats[playerX].L++; sessionScores.O++;
      if (!vsAI) stats[playerO].W++;
    } else {
      stats[playerX].T++; sessionScores.Tie++;
      if (!vsAI) stats[playerO].T++;
    }
    updateStatsTable();
    updateScoreBoxes();
  }

  // ── Game ──
  function init() {
    boardEl.innerHTML = '';
    cells.length = 0;
    board      = Array(9).fill(null);
    current    = 'X';
    over       = false;
    aiThinking = false;
    rollPhase  = true;

    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell locked';
      cell.addEventListener('click', () => handleClick(i));
      boardEl.appendChild(cell);
      cells.push(cell);
    }

    buildDieFaces();
    resetDice();

    // Wire up die clicks
    document.getElementById('die-x').onclick = rollX;
    document.getElementById('die-o').onclick = vsAI ? null : rollO;
  }

  function handleClick(i) {
    if (rollPhase || over || board[i] || aiThinking) return;
    if (vsAI && current === 'O') return;
    applyMove(i);
    if (!over && vsAI && current === 'O') {
      aiThinking = true;
      setStatus('AI is thinking…');
      setTimeout(() => { aiThinking = false; applyMove(getAIMove()); }, 300);
    }
  }

  function applyMove(i) {
    board[i] = current;
    cells[i].textContent = current;
    cells[i].classList.remove('locked');
    cells[i].classList.add('taken', current.toLowerCase());

    const winLine = getWin(board);
    if (winLine) {
      winLine.forEach(idx => cells[idx].classList.add('win'));
      recordResult(current);
      const name = current === 'X' ? playerX : (vsAI ? 'AI' : playerO);
      setStatus(`${name} wins!`);
      over = true;
      return;
    }

    if (board.every(Boolean)) {
      recordResult(null);
      setStatus("It's a tie!");
      over = true;
      return;
    }

    current = current === 'X' ? 'O' : 'X';
    const turnName = current === 'X' ? playerX : (vsAI ? 'AI' : playerO);
    if (!(vsAI && current === 'O')) setStatus(`${turnName}'s turn`);
  }

  function getWin(b) {
    for (const [a, bIdx, c] of WINS)
      if (b[a] && b[a] === b[bIdx] && b[a] === b[c]) return [a, bIdx, c];
    return null;
  }

  // ── AI ──
  function getAIMove() {
    if (difficulty === 'easy')   return easyMove();
    if (difficulty === 'medium') return Math.random() < 0.5 ? bestMove() : easyMove();
    return bestMove();
  }

  function easyMove() {
    const empty = board.map((v,i) => v === null ? i : -1).filter(i => i >= 0);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function bestMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (board[i]) continue;
      board[i] = 'O';
      const score = minimax(board, 0, false);
      board[i] = null;
      if (score > best) { best = score; move = i; }
    }
    return move;
  }

  function minimax(b, depth, isMax) {
    const win = getWin(b);
    if (win) return b[win[0]] === 'O' ? 10 - depth : depth - 10;
    if (b.every(Boolean)) return 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i]) continue;
        b[i] = 'O'; best = Math.max(best, minimax(b, depth+1, false)); b[i] = null;
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i]) continue;
        b[i] = 'X'; best = Math.min(best, minimax(b, depth+1, true)); b[i] = null;
      }
      return best;
    }
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  document.getElementById('reset').addEventListener('click', init);

  // Initial setup
  refreshLabels();
  highlightStatsRows();
  updateStatsTable();
  init();
</script>
